// ─── TECHNICAL ANALYSIS UTILITIES ────────────────────────────────────────────
function calcEMA(data, period) {
  if (!data || data.length < period) return [];
  const k = 2 / (period + 1);
  let ema = [data.slice(0, period).reduce((a, b) => a + b, 0) / period];
  for (let i = period; i < data.length; i++) {
    ema.push(data[i] * k + ema[ema.length - 1] * (1 - k));
  }
  return ema;
}
function calcRSI(closes, period = 14) {
  if (!closes || closes.length < period + 1) return 50;
  let gains = 0,
    losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gains += d;else losses -= d;
  }
  let avgGain = gains / period,
    avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + Math.max(d, 0)) / period;
    avgLoss = (avgLoss * (period - 1) + Math.max(-d, 0)) / period;
  }
  if (avgLoss === 0) return 100;
  return 100 - 100 / (1 + avgGain / avgLoss);
}
function calcATR(highs, lows, closes, period = 14) {
  if (!highs || highs.length < 2) return 0;
  const tr = highs.map((h, i) => {
    if (i === 0) return h - lows[i];
    return Math.max(h - lows[i], Math.abs(h - closes[i - 1]), Math.abs(lows[i] - closes[i - 1]));
  });
  return tr.slice(-period).reduce((a, b) => a + b, 0) / period;
}
function calcBollingerBands(closes, period = 20, mult = 2) {
  if (!closes || closes.length < period) return {
    upper: 0,
    mid: 0,
    lower: 0
  };
  const slice = closes.slice(-period);
  const mid = slice.reduce((a, b) => a + b, 0) / period;
  const std = Math.sqrt(slice.reduce((a, b) => a + (b - mid) ** 2, 0) / period);
  return {
    upper: mid + mult * std,
    mid,
    lower: mid - mult * std
  };
}
function calcMACD(closes) {
  if (!closes || closes.length < 26) return {
    macd: 0,
    signal: 0,
    hist: 0
  };
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  const diff = ema26.length;
  const macdLine = ema12.slice(-diff).map((v, i) => v - ema26[i]);
  const signalLine = calcEMA(macdLine, 9);
  const macd = macdLine[macdLine.length - 1] || 0;
  const signal = signalLine[signalLine.length - 1] || 0;
  return {
    macd,
    signal,
    hist: macd - signal
  };
}

// ─── SMC ANALYSIS ─────────────────────────────────────────────────────────────
function detectSMC(candles) {
  if (!candles || candles.length < 10) return {
    bos: null,
    choch: null,
    orderBlocks: [],
    fvgs: []
  };
  const highs = candles.map(c => c.high);
  const lows = candles.map(c => c.low);
  const n = candles.length;

  // BOS / CHoCH detection (simplified)
  const prevHigh = Math.max(...highs.slice(-6, -1));
  const prevLow = Math.min(...lows.slice(-6, -1));
  const lastClose = candles[n - 1].close;
  const bos = lastClose > prevHigh ? "bullish" : lastClose < prevLow ? "bearish" : null;
  const choch = !bos && candles[n - 1].close > candles[n - 3].high ? "bullish" : null;

  // Order blocks (last significant up/down candle before a strong move)
  const orderBlocks = [];
  for (let i = 2; i < Math.min(n, 8); i++) {
    const c = candles[n - 1 - i];
    const next = candles[n - i];
    if (next.close > c.high * 1.001) orderBlocks.push({
      type: "bullish",
      high: c.high,
      low: c.low
    });else if (next.close < c.low * 0.999) orderBlocks.push({
      type: "bearish",
      high: c.high,
      low: c.low
    });
  }

  // FVGs
  const fvgs = [];
  for (let i = 2; i < Math.min(n, 6); i++) {
    const a = candles[n - 1 - i];
    const c2 = candles[n - 1 - (i - 2)];
    if (c2.low > a.high) fvgs.push({
      type: "bullish",
      top: c2.low,
      bottom: a.high
    });
    if (c2.high < a.low) fvgs.push({
      type: "bearish",
      top: a.low,
      bottom: c2.high
    });
  }
  return {
    bos,
    choch,
    orderBlocks,
    fvgs
  };
}

// ─── CONFIDENCE ENGINE ────────────────────────────────────────────────────────
function generateSignal(candles, market) {
  if (!candles || candles.length < 30) return null;
  const closes = candles.map(c => c.close);
  const highs = candles.map(c => c.high);
  const lows = candles.map(c => c.low);
  const rsi = calcRSI(closes);
  const macd = calcMACD(closes);
  const atr = calcATR(highs, lows, closes);
  const bb = calcBollingerBands(closes);
  const ema50 = calcEMA(closes, Math.min(50, closes.length));
  const ema200 = calcEMA(closes, Math.min(200, closes.length));
  const smc = detectSMC(candles);
  const last = closes[closes.length - 1];
  let score = 50;
  const reasons = [];

  // RSI
  if (rsi < 35) {
    score += 12;
    reasons.push("RSI Oversold – Bullish Recovery");
  } else if (rsi > 65) {
    score -= 12;
    reasons.push("RSI Overbought – Bearish Pressure");
  }

  // MACD
  if (macd.hist > 0) {
    score += 8;
    reasons.push("MACD Bullish Momentum");
  } else {
    score -= 8;
    reasons.push("MACD Bearish Momentum");
  }

  // Bollinger
  if (last <= bb.lower) {
    score += 10;
    reasons.push("Price at Lower BB – Buy Zone");
  } else if (last >= bb.upper) {
    score -= 10;
    reasons.push("Price at Upper BB – Sell Zone");
  }

  // EMA trend
  const e50 = ema50[ema50.length - 1];
  const e200 = ema200[ema200.length - 1];
  if (e50 && e200) {
    if (e50 > e200 && last > e50) {
      score += 10;
      reasons.push("Price Above EMA 50/200 – Uptrend");
    }
    if (e50 < e200 && last < e50) {
      score -= 10;
      reasons.push("Price Below EMA 50/200 – Downtrend");
    }
  }

  // SMC
  if (smc.bos === "bullish") {
    score += 15;
    reasons.push("Bullish BOS Confirmed");
  }
  if (smc.bos === "bearish") {
    score -= 15;
    reasons.push("Bearish BOS Confirmed");
  }
  if (smc.choch === "bullish") {
    score += 10;
    reasons.push("CHoCH – Structure Shift Bullish");
  }
  if (smc.orderBlocks.some(ob => ob.type === "bullish")) {
    score += 8;
    reasons.push("Bullish Order Block Retest");
  }
  if (smc.orderBlocks.some(ob => ob.type === "bearish")) {
    score -= 8;
    reasons.push("Bearish Order Block Formed");
  }
  if (smc.fvgs.some(f => f.type === "bullish")) {
    score += 5;
    reasons.push("Bullish FVG Present");
  }

  // Market-type bias
  if (market.type === "boom" && rsi < 50) {
    score += 5;
    reasons.push("Boom Market Bias – Spike Expected");
  }
  if (market.type === "crash" && rsi > 50) {
    score += 5;
    reasons.push("Crash Market Bias – Drop Expected");
  }
  const direction = score > 55 ? "BUY" : score < 45 ? "SELL" : "WAIT";
  const confidence = Math.min(98, Math.max(40, Math.abs(score - 50) * 2.2 + 40));
  const risk = confidence > 80 ? "Low" : confidence > 65 ? "Medium" : "High";
  return {
    direction,
    confidence: Math.round(confidence),
    reasons: reasons.slice(0, 5),
    rsi: Math.round(rsi),
    macd,
    atr: atr.toFixed(5),
    bb,
    smc,
    risk,
    marketBias: score > 55 ? "Bullish" : score < 45 ? "Bearish" : "Neutral",
    timestamp: new Date()
  };
}

// ─── LOT SIZE CALCULATOR ──────────────────────────────────────────────────────
function calcLotSize(balance, riskPct, atr, direction) {
  const riskAmount = balance * riskPct / 100;
  const slPips = atr ? parseFloat(atr) * 1.5 : balance * 0.003;
  const lotSize = Math.max(0.01, riskAmount / (slPips * 10000)).toFixed(2);
  const sl = direction === "BUY" ? (-(slPips * 10000)).toFixed(0) + " pips" : (+(slPips * 10000)).toFixed(0) + " pips";
  const tp = direction === "BUY" ? (+(slPips * 20000)).toFixed(0) + " pips" : (-(slPips * 20000)).toFixed(0) + " pips";
  return {
    lotSize,
    riskAmount: riskAmount.toFixed(2),
    sl,
    tp
  };
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function DerivAITrader() {
  const [tab, setTab] = useState("dashboard");
  const [apiToken, setApiToken] = useState("");
  const [tokenInput, setTokenInput] = useState("");
  const [connected, setConnected] = useState(false);
  const [connecting, setConnecting] = useState(false);
  const [account, setAccount] = useState(null);
  const [balance, setBalance] = useState(null);
  const [openPos, setOpenPos] = useState([]);
  const [tradeHistory, setTradeHistory] = useState([]);
  const [signals, setSignals] = useState({});
  const [selectedMarket, setSelectedMarket] = useState(MARKETS[2]);
  const [candles, setCandles] = useState({});
  const [livePrice, setLivePrice] = useState({});
  const [riskMode, setRiskMode] = useState("moderate");
  const [tradeMode, setTradeMode] = useState("signal");
  const [autoTrading, setAutoTrading] = useState(false);
  const [notifications, setNotifications] = useState([]);
  const [dailyPnl, setDailyPnl] = useState(0);
  const [equityCurve, setEquityCurve] = useState([]);
  const [wsReady, setWsReady] = useState(false);
  const [pendingTrade, setPendingTrade] = useState(null);
  const [journal, setJournal] = useState([]);
  const [analyzing, setAnalyzing] = useState(false);
  const [winRate, setWinRate] = useState(0);
  const [lossSeries, setLossSeries] = useState(0);
  const wsRef = useRef(null);
  const reqId = useRef(1);
  const pendingReqs = useRef({});

  // ── WebSocket Connection ──────────────────────────────────────────────────
  const sendWS = useCallback(payload => {
    return new Promise((resolve, reject) => {
      if (!wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) {
        reject(new Error("WebSocket not open"));
        return;
      }
      const id = reqId.current++;
      payload.req_id = id;
      pendingReqs.current[id] = {
        resolve,
        reject
      };
      wsRef.current.send(JSON.stringify(payload));
      setTimeout(() => {
        if (pendingReqs.current[id]) {
          delete pendingReqs.current[id];
          reject(new Error("Request timed out"));
        }
      }, 15000);
    });
  }, []);
  const connectWS = useCallback(() => {
    return new Promise((resolve, reject) => {
      const ws = new WebSocket(DERIV_WS_URL);
      wsRef.current = ws;
      ws.onopen = () => {
        setWsReady(true);
        resolve(ws);
      };
      ws.onerror = () => reject(new Error("WebSocket connection failed"));
      ws.onclose = () => {
        setWsReady(false);
        setConnected(false);
      };
      ws.onmessage = evt => {
        try {
          const msg = JSON.parse(evt.data);
          const reqId2 = msg.req_id;
          if (reqId2 && pendingReqs.current[reqId2]) {
            const {
              resolve: res,
              reject: rej
            } = pendingReqs.current[reqId2];
            delete pendingReqs.current[reqId2];
            if (msg.error) rej(new Error(msg.error.message));else res(msg);
          }
          // Live tick stream
          if (msg.tick) {
            const {
              symbol,
              quote
            } = msg.tick;
            setLivePrice(prev => ({
              ...prev,
              [symbol]: quote
            }));
          }
          // Balance updates
          if (msg.balance) {
            setBalance(msg.balance.balance);
            setEquityCurve(prev => [...prev.slice(-49), msg.balance.balance]);
          }
          // Open contracts stream
          if (msg.proposal_open_contract) {
            const c = msg.proposal_open_contract;
            setOpenPos(prev => {
              const idx = prev.findIndex(p => p.contract_id === c.contract_id);
              if (idx >= 0) {
                const n = [...prev];
                n[idx] = c;
                return n;
              }
              return [...prev, c];
            });
          }
        } catch (_) {}
      };
    });
  }, []);

  // ── Login ─────────────────────────────────────────────────────────────────
  const login = useCallback(async () => {
    if (!tokenInput.trim()) return;
    setConnecting(true);
    addNotif("Connecting to Deriv…", "info");
    try {
      await connectWS();
      const auth = await sendWS({
        authorize: tokenInput.trim()
      });
      const acct = auth.authorize;
      setAccount(acct);
      setApiToken(tokenInput.trim());
      setConnected(true);
      // Get balance
      await sendWS({
        balance: 1,
        subscribe: 1
      });
      // Open contracts
      try {
        await sendWS({
          portfolio: 1
        });
      } catch (_) {}
      // Trade history
      try {
        const hist = await sendWS({
          profit_table: 1,
          limit: 20,
          sort: "DESC"
        });
        if (hist.profit_table?.transactions) {
          setTradeHistory(hist.profit_table.transactions);
          const wins = hist.profit_table.transactions.filter(t => t.sell_price > t.buy_price).length;
          setWinRate(Math.round(wins / hist.profit_table.transactions.length * 100) || 0);
        }
      } catch (_) {}
      addNotif(`✅ Connected as ${acct.loginid}`, "success");
      // Subscribe to ticks for all markets
      MARKETS.forEach(m => {
        try {
          sendWS({
            ticks: m.id,
            subscribe: 1
          });
        } catch (_) {}
      });
      // Start analysis
      startAnalysis();
    } catch (e) {
      addNotif(`❌ ${e.message}`, "error");
    }
    setConnecting(false);
  }, [tokenInput, connectWS, sendWS]);
  const disconnect = useCallback(() => {
    if (wsRef.current) wsRef.current.close();
    setConnected(false);
    setAccount(null);
    setBalance(null);
    setApiToken("");
    setSignals({});
    setOpenPos([]);
    addNotif("Disconnected from Deriv", "info");
  }, []);

  // ── Fetch Candles ─────────────────────────────────────────────────────────
  const fetchCandles = useCallback(async symbol => {
    try {
      const res = await sendWS({
        ticks_history: symbol,
        count: 200,
        end: "latest",
        granularity: 60,
        style: "candles"
      });
      if (res.candles) {
        setCandles(prev => ({
          ...prev,
          [symbol]: res.candles
        }));
        return res.candles;
      }
    } catch (_) {}
    return null;
  }, [sendWS]);

  // ── Analysis Loop ─────────────────────────────────────────────────────────
  const startAnalysis = useCallback(async () => {
    setAnalyzing(true);
    for (const market of MARKETS) {
      try {
        const c = await fetchCandles(market.id);
        if (c && c.length > 30) {
          const sig = generateSignal(c, market);
          if (sig) {
            setSignals(prev => ({
              ...prev,
              [market.id]: sig
            }));
            if (sig.confidence >= 80 && sig.direction !== "WAIT") {
              addNotif(`🔔 ${market.label}: ${sig.direction} ${sig.confidence}% confidence`, "signal");
            }
          }
        }
      } catch (_) {}
    }
    setAnalyzing(false);
  }, [fetchCandles]);

  // Re-analyze every 30s
  useEffect(() => {
    if (!connected) return;
    const t = setInterval(startAnalysis, 30000);
    return () => clearInterval(t);
  }, [connected, startAnalysis]);

  // ── Trade Execution ───────────────────────────────────────────────────────
  const executeTrade = useCallback(async (market, signal, lotSize) => {
    if (!connected || !wsRef.current) return;
    addNotif(`⚡ Placing ${signal.direction} on ${market.label}…`, "info");
    try {
      // Get proposal
      const contractType = signal.direction === "BUY" ? "CALL" : "PUT";
      const proposal = await sendWS({
        proposal: 1,
        amount: parseFloat(lotSize) * 10,
        basis: "stake",
        contract_type: contractType,
        currency: account?.currency || "USD",
        duration: 5,
        duration_unit: "m",
        symbol: market.id
      });
      if (proposal.proposal?.id) {
        const buy = await sendWS({
          buy: proposal.proposal.id,
          price: proposal.proposal.ask_price
        });
        if (buy.buy) {
          addNotif(`✅ Trade placed! Contract: ${buy.buy.contract_id}`, "success");
          const entry = {
            id: buy.buy.contract_id,
            market: market.label,
            direction: signal.direction,
            confidence: signal.confidence,
            lot: lotSize,
            time: new Date().toISOString(),
            status: "open"
          };
          setJournal(prev => [entry, ...prev]);
          setLossSeries(0);
        }
      }
